<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Thread - Virtual Fashion Try-On</title>
    <meta
      name="description"
      content="Virtual Thread is a virtual fashion try-on platform with 3D avatars and AR-like interaction."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              onyx: "#0b0b0c",
              graphite: "#16161a",
              steel: "#24242a",
              ash: "#a6a6ab",
              snow: "#f5f5f5",
              smoke: "#c7c7cc",
              charcoal: "#0f0f12"
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["Manrope", "sans-serif"]
            },
            boxShadow: {
              glow: "0 0 40px rgba(255, 255, 255, 0.08)",
              glass: "0 20px 60px rgba(0, 0, 0, 0.4)"
            }
          }
        }
      };
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        font-family: "Manrope", sans-serif;
        background: #0b0b0c;
        color: #f5f5f5;
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 45%),
          radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.06), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05), transparent 45%);
        opacity: 0.8;
        pointer-events: none;
        z-index: 0;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      .page-in {
        animation: pageIn 0.7s ease both;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .scan-line {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: scan 2s ease-in-out infinite;
      }

      @keyframes scan {
        0% {
          transform: translateY(-100%);
          opacity: 0.2;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(100%);
          opacity: 0.2;
        }
      }

      .pulse-dot {
        position: relative;
      }

      .pulse-dot::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f5f5f5;
        display: inline-block;
        margin-right: 8px;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        animation: pulse 1.6s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.9);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(0.9);
          opacity: 0.6;
        }
      }

      .noise {
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        opacity: 0.25;
        pointer-events: none;
        border-radius: inherit;
      }

      .glass {
        background: rgba(22, 22, 26, 0.6);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .input-base {
        background: rgba(15, 15, 18, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #f5f5f5;
      }

      .input-base:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
      }

      .range {
        accent-color: #f5f5f5;
      }
    </style>
  </head>
  <body class="bg-onyx text-snow">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const makeMockImage = (label, accent) => {
        const svg = `
          <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 480 640'>
            <defs>
              <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
                <stop offset='0%' stop-color='${accent}' />
                <stop offset='100%' stop-color='#0f0f12' />
              </linearGradient>
            </defs>
            <rect width='480' height='640' rx='36' fill='url(#g)' />
            <rect x='30' y='40' width='420' height='560' rx='28' fill='rgba(255,255,255,0.05)' stroke='rgba(255,255,255,0.1)' />
            <text x='50%' y='52%' font-family='Manrope, sans-serif' font-size='28' fill='rgba(245,245,245,0.85)' text-anchor='middle'>${label}</text>
          </svg>
        `;
        return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
      };

      const outfitData = [
        {
          id: "st-1",
          name: "Orbit Utility Set",
          category: "Streetwear",
          image: makeMockImage("Orbit Utility Set", "#2b2b33"),
          price: "$180"
        },
        {
          id: "st-2",
          name: "Night Grid Hoodie",
          category: "Streetwear",
          image: makeMockImage("Night Grid Hoodie", "#1d1d26"),
          price: "$140"
        },
        {
          id: "st-3",
          name: "Mono Cargo Suit",
          category: "Streetwear",
          image: makeMockImage("Mono Cargo Suit", "#2f2f35"),
          price: "$210"
        },
        {
          id: "st-4",
          name: "Edge Runner Coat",
          category: "Streetwear",
          image: makeMockImage("Edge Runner Coat", "#222229"),
          price: "$260"
        },
        {
          id: "lx-1",
          name: "Aurelia Silk Set",
          category: "Luxury",
          image: makeMockImage("Aurelia Silk Set", "#3a3a45"),
          price: "$540"
        },
        {
          id: "lx-2",
          name: "Monarch Tailored",
          category: "Luxury",
          image: makeMockImage("Monarch Tailored", "#2b2b39"),
          price: "$720"
        },
        {
          id: "lx-3",
          name: "Velvet Noir",
          category: "Luxury",
          image: makeMockImage("Velvet Noir", "#32323f"),
          price: "$640"
        },
        {
          id: "lx-4",
          name: "Lumen Atelier",
          category: "Luxury",
          image: makeMockImage("Lumen Atelier", "#292933"),
          price: "$590"
        }
      ];

      const brandList = ["Maison Sable", "Studio Noir", "Drift", "Lineage", "Aether", "Ivory Lab"];

      const steps = [
        {
          title: "Build your avatar",
          desc: "Upload a selfie or input measurements to generate a 3D body model."
        },
        {
          title: "Pick outfits",
          desc: "Browse curated drops from streetwear to luxury collections."
        },
        {
          title: "Preview in real time",
          desc: "Rotate, zoom, and simulate AR fit before you buy."
        }
      ];

      const PrimaryButton = ({ children, className = "", ...props }) => (
        <button
          className={`px-6 py-3 rounded-full bg-snow text-onyx font-semibold tracking-wide transition duration-300 hover:-translate-y-0.5 hover:shadow-glow ${className}`}
          {...props}
        >
          {children}
        </button>
      );

      const GhostButton = ({ children, className = "", ...props }) => (
        <button
          className={`px-6 py-3 rounded-full border border-white/20 text-snow font-semibold tracking-wide transition duration-300 hover:border-white/60 ${className}`}
          {...props}
        >
          {children}
        </button>
      );

      const SectionHeader = ({ eyebrow, title, subtitle }) => (
        <div className="space-y-3">
          <p className="text-ash uppercase text-xs tracking-[0.3em]">{eyebrow}</p>
          <h2 className="text-3xl md:text-4xl font-display">{title}</h2>
          <p className="text-ash max-w-2xl">{subtitle}</p>
        </div>
      );

      const Pill = ({ children }) => (
        <span className="px-3 py-1 rounded-full text-xs uppercase tracking-widest border border-white/20 text-ash">
          {children}
        </span>
      );

      const PageShell = ({ children }) => (
        <div className="max-w-6xl mx-auto px-6 md:px-10 py-12 md:py-16">{children}</div>
      );

      const HeroVisual = () => (
        <div className="relative w-full max-w-md mx-auto">
          <div className="absolute inset-0 bg-gradient-to-br from-white/5 via-white/0 to-white/10 rounded-[2.5rem] blur-2xl" />
          <div className="relative glass rounded-[2.5rem] p-8 overflow-hidden shadow-glass float">
            <div className="noise"></div>
            <div className="flex items-start justify-between">
              <div>
                <p className="text-ash text-xs uppercase tracking-[0.3em]">AI Fit</p>
                <h3 className="text-2xl font-display">Virtual Thread</h3>
              </div>
              <Pill>3D</Pill>
            </div>
            <div className="mt-8 grid grid-cols-2 gap-4">
              <div className="rounded-2xl bg-gradient-to-br from-white/10 to-white/5 h-44"></div>
              <div className="rounded-2xl bg-gradient-to-br from-white/5 to-white/0 h-44 border border-white/10"></div>
            </div>
            <div className="mt-6 flex items-center justify-between text-sm text-ash">
              <span>Real-time drape mapping</span>
              <span>AR ready</span>
            </div>
          </div>
        </div>
      );

      const LandingPage = ({ onStart }) => (
        <PageShell>
          <div className="grid lg:grid-cols-[1.2fr_0.8fr] gap-12 items-center page-in">
            <div className="space-y-8">
              <Pill>Virtual Fashion Studio</Pill>
              <h1 className="text-4xl md:text-6xl font-display leading-tight">
                Try Fashion Before You Buy
              </h1>
              <p className="text-ash text-lg max-w-xl">
                Virtual Thread is a digital try-on experience that blends 3D avatars with AR-like
                interaction. Explore luxury and streetwear fits with instant realism.
              </p>
              <div className="flex flex-wrap gap-4">
                <PrimaryButton onClick={onStart}>Start Try-On</PrimaryButton>
                <GhostButton>Watch Demo</GhostButton>
              </div>
              <div className="grid grid-cols-2 gap-6 pt-4">
                <div className="glass rounded-2xl p-4">
                  <p className="text-3xl font-display">48k+</p>
                  <p className="text-ash text-sm">Outfits simulated weekly</p>
                </div>
                <div className="glass rounded-2xl p-4">
                  <p className="text-3xl font-display">96%</p>
                  <p className="text-ash text-sm">Fit accuracy on first try</p>
                </div>
              </div>
            </div>
            <HeroVisual />
          </div>

          <div className="mt-20 space-y-14">
            <SectionHeader
              eyebrow="Featured Brands"
              title="Luxury and streetwear, curated"
              subtitle="A rotating edit of fashion houses and emerging studios optimized for digital fit."
            />
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {brandList.map((brand) => (
                <div
                  key={brand}
                  className="glass rounded-2xl px-5 py-6 text-center text-sm uppercase tracking-[0.2em] text-ash"
                >
                  {brand}
                </div>
              ))}
            </div>
          </div>

          <div className="mt-20 space-y-14">
            <SectionHeader
              eyebrow="Trending"
              title="Outfits leading the feed"
              subtitle="Real-time demand forecasts and curated capsules blended into a single lookbook."
            />
            <div className="grid md:grid-cols-3 gap-6">
              {outfitData.slice(0, 3).map((item) => (
                <div
                  key={item.id}
                  className="glass rounded-3xl overflow-hidden border border-white/10"
                >
                  <img src={item.image} alt={item.name} className="w-full h-64 object-cover" />
                  <div className="p-5 space-y-2">
                    <p className="text-lg font-display">{item.name}</p>
                    <p className="text-ash text-sm">{item.category}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="mt-20 space-y-14">
            <SectionHeader
              eyebrow="How It Works"
              title="Three steps to a perfect fit"
              subtitle="Built for speed, realism, and confidence before you commit."
            />
            <div className="grid md:grid-cols-3 gap-6">
              {steps.map((step, index) => (
                <div key={step.title} className="glass rounded-3xl p-6 space-y-4">
                  <div className="text-sm uppercase tracking-[0.3em] text-ash">0{index + 1}</div>
                  <h3 className="text-xl font-display">{step.title}</h3>
                  <p className="text-ash text-sm">{step.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </PageShell>
      );

      const AvatarCreationPage = ({
        onGenerate,
        mode,
        setMode,
        isGenerating,
        statusText,
        avatarReady,
        onContinue
      }) => (
        <PageShell>
          <div className="page-in space-y-12">
            <SectionHeader
              eyebrow="Avatar Creation"
              title="Create your 3D fit twin"
              subtitle="Upload a selfie or input measurements to generate a high-fidelity avatar."
            />

            <div className="grid lg:grid-cols-[1.1fr_0.9fr] gap-8">
              <div className="glass rounded-3xl p-6 space-y-6">
                <div className="flex gap-3">
                  <button
                    className={`px-4 py-2 rounded-full text-sm border transition ${
                      mode === "selfie"
                        ? "bg-snow text-onyx border-transparent"
                        : "border-white/20 text-ash"
                    }`}
                    onClick={() => setMode("selfie")}
                  >
                    Upload Selfie
                  </button>
                  <button
                    className={`px-4 py-2 rounded-full text-sm border transition ${
                      mode === "measurements"
                        ? "bg-snow text-onyx border-transparent"
                        : "border-white/20 text-ash"
                    }`}
                    onClick={() => setMode("measurements")}
                  >
                    Enter Measurements
                  </button>
                </div>

                {mode === "selfie" ? (
                  <div className="space-y-4">
                    <label className="text-sm text-ash">Upload selfie</label>
                    <input type="file" className="input-base w-full rounded-2xl p-4" />
                    <div className="text-xs text-ash">
                      Tip: Use front light and a neutral background for best results.
                    </div>
                  </div>
                ) : (
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="space-y-2">
                      <label className="text-sm text-ash">Height</label>
                      <input
                        placeholder="180 cm"
                        className="input-base w-full rounded-2xl p-4"
                      />
                    </div>
                    <div className="space-y-2">
                      <label className="text-sm text-ash">Weight</label>
                      <input
                        placeholder="72 kg"
                        className="input-base w-full rounded-2xl p-4"
                      />
                    </div>
                    <div className="space-y-2">
                      <label className="text-sm text-ash">Chest</label>
                      <input
                        placeholder="96 cm"
                        className="input-base w-full rounded-2xl p-4"
                      />
                    </div>
                    <div className="space-y-2">
                      <label className="text-sm text-ash">Waist</label>
                      <input
                        placeholder="78 cm"
                        className="input-base w-full rounded-2xl p-4"
                      />
                    </div>
                  </div>
                )}

                <div className="pt-4 flex flex-wrap gap-4 items-center">
                  <PrimaryButton onClick={onGenerate} disabled={isGenerating}>
                    {isGenerating ? "Generating..." : "Generate Avatar"}
                  </PrimaryButton>
                  {avatarReady && (
                    <GhostButton onClick={onContinue}>Continue to Outfits</GhostButton>
                  )}
                </div>

                {isGenerating && (
                  <div className="mt-4 glass rounded-2xl p-4 space-y-3">
                    <div className="flex items-center gap-3">
                      <div className="h-3 w-3 rounded-full bg-snow animate-pulse"></div>
                      <p className="text-sm text-ash">{statusText}</p>
                    </div>
                    <div className="h-2 rounded-full bg-white/10 overflow-hidden">
                      <div className="h-full w-2/3 bg-white/50 animate-pulse" />
                    </div>
                  </div>
                )}
              </div>

              <div className="glass rounded-3xl p-6 space-y-6">
                <div className="flex items-center justify-between">
                  <h3 className="text-xl font-display">Avatar Preview</h3>
                  <Pill>3D Render</Pill>
                </div>
                <div className="relative rounded-3xl h-96 bg-gradient-to-br from-white/10 to-white/0 border border-white/10 overflow-hidden">
                  <div className="noise"></div>
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="w-40 h-64 rounded-[3rem] border border-white/20 bg-white/5"></div>
                  </div>
                  {isGenerating && <div className="scan-line" />}
                </div>
                <div className="text-sm text-ash">
                  {avatarReady
                    ? "Avatar ready. Fit calibration synced."
                    : "Preview updates as your avatar is generated."}
                </div>
              </div>
            </div>
          </div>
        </PageShell>
      );

      const OutfitCard = ({ item, onTry, selected }) => (
        <div
          className={`glass rounded-3xl overflow-hidden border transition ${
            selected ? "border-white/60" : "border-white/10"
          }`}
        >
          <img src={item.image} alt={item.name} className="w-full h-72 object-cover" />
          <div className="p-5 space-y-2">
            <p className="text-lg font-display">{item.name}</p>
            <div className="flex items-center justify-between text-sm text-ash">
              <span>{item.category}</span>
              <span>{item.price}</span>
            </div>
            <button
              className="w-full mt-2 py-2 rounded-full border border-white/20 text-sm uppercase tracking-[0.2em] hover:border-white/60 transition"
              onClick={onTry}
            >
              Try On
            </button>
          </div>
        </div>
      );

      const OutfitSelectionPage = ({ category, setCategory, onTryOutfit, selectedId }) => {
        const filtered = outfitData.filter((item) => item.category === category);
        return (
          <PageShell>
            <div className="page-in space-y-12">
              <SectionHeader
                eyebrow="Outfit Selection"
                title="Choose your look"
                subtitle="Switch between categories and preview fits instantly."
              />

              <div className="flex flex-wrap gap-3">
                {["Streetwear", "Luxury"].map((cat) => (
                  <button
                    key={cat}
                    className={`px-4 py-2 rounded-full text-sm border transition ${
                      category === cat
                        ? "bg-snow text-onyx border-transparent"
                        : "border-white/20 text-ash"
                    }`}
                    onClick={() => setCategory(cat)}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filtered.map((item) => (
                  <OutfitCard
                    key={item.id}
                    item={item}
                    selected={selectedId === item.id}
                    onTry={() => onTryOutfit(item.id)}
                  />
                ))}
              </div>
            </div>
          </PageShell>
        );
      };

      const TryOnPage = ({
        outfit,
        rotation,
        setRotation,
        zoom,
        setZoom,
        onNext,
        onPrev,
        onOpenAr,
        saved,
        onSave,
        onBuy
      }) => (
        <PageShell>
          <div className="page-in space-y-12">
            <SectionHeader
              eyebrow="Virtual Try-On"
              title="Real-time fit preview"
              subtitle="Rotate, zoom, and adjust outfits with AI fit simulation." 
            />

            <div className="grid lg:grid-cols-[1.1fr_0.9fr] gap-8 items-start">
              <div className="glass rounded-[2.5rem] p-6 relative overflow-hidden">
                <div className="noise"></div>
                <div className="flex items-center justify-between mb-4">
                  <Pill>AI Fit Simulation Active</Pill>
                  <span className="text-xs uppercase tracking-[0.3em] text-ash">Live Preview</span>
                </div>
                <div className="relative flex items-center justify-center h-[520px]">
                  <div
                    className="relative w-full max-w-sm h-full rounded-[2.5rem] border border-white/10 bg-gradient-to-b from-white/10 to-white/0 overflow-hidden transition-transform duration-500"
                    style={{
                      transform: `perspective(1200px) rotateY(${rotation * 12}deg) scale(${zoom})`
                    }}
                  >
                    <div className="noise"></div>
                    <div className="absolute inset-0 flex items-center justify-center">
                      <div className="w-40 h-64 rounded-[3rem] border border-white/25 bg-white/5"></div>
                    </div>
                    <img
                      src={outfit.image}
                      alt={outfit.name}
                      className="absolute inset-0 w-full h-full object-cover mix-blend-screen opacity-90"
                    />
                  </div>
                </div>

                <div className="mt-6 flex flex-wrap gap-3 items-center">
                  <span className="text-xs uppercase tracking-[0.3em] text-ash">Rotate</span>
                  <div className="flex gap-2">
                    <GhostButton className="px-4" onClick={() => setRotation(-1)}>
                      Left
                    </GhostButton>
                    <GhostButton className="px-4" onClick={() => setRotation(0)}>
                      Center
                    </GhostButton>
                    <GhostButton className="px-4" onClick={() => setRotation(1)}>
                      Right
                    </GhostButton>
                  </div>
                </div>

                <div className="mt-6 flex items-center gap-4">
                  <span className="text-xs uppercase tracking-[0.3em] text-ash">Zoom</span>
                  <input
                    type="range"
                    min="0.9"
                    max="1.2"
                    step="0.01"
                    value={zoom}
                    onChange={(e) => setZoom(parseFloat(e.target.value))}
                    className="range w-full"
                  />
                </div>
              </div>

              <div className="space-y-6">
                <div className="glass rounded-3xl p-6 space-y-4">
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-ash text-xs uppercase tracking-[0.3em]">Selected Outfit</p>
                      <h3 className="text-2xl font-display">{outfit.name}</h3>
                    </div>
                    <Pill>{outfit.category}</Pill>
                  </div>
                  <p className="text-ash">
                    Fabric drape, stretch, and silhouette are simulated in real time. Fine-tune the
                    fit using rotation and zoom controls.
                  </p>
                  <div className="flex items-center justify-between text-sm text-ash">
                    <span className="pulse-dot">Real-time Fit Preview</span>
                    <span>{outfit.price}</span>
                  </div>
                  <div className="flex gap-3 flex-wrap">
                    <GhostButton onClick={onPrev}>Previous</GhostButton>
                    <GhostButton onClick={onNext}>Next</GhostButton>
                  </div>
                </div>

                <div className="glass rounded-3xl p-6 space-y-4">
                  <p className="text-ash text-xs uppercase tracking-[0.3em]">Actions</p>
                  <div className="grid gap-3">
                    <PrimaryButton onClick={onOpenAr}>Try in AR</PrimaryButton>
                    <GhostButton onClick={onSave}>{saved ? "Look Saved" : "Save Look"}</GhostButton>
                    <GhostButton onClick={onBuy}>Buy Now</GhostButton>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </PageShell>
      );

      const Navigation = ({ page, setPage }) => {
        const links = [
          { id: "landing", label: "Home" },
          { id: "avatar", label: "Avatar" },
          { id: "outfits", label: "Outfits" },
          { id: "tryon", label: "Try-On" }
        ];

        return (
          <nav className="sticky top-0 z-40 bg-onyx/70 backdrop-blur border-b border-white/10">
            <div className="max-w-6xl mx-auto px-6 md:px-10 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="h-9 w-9 rounded-full border border-white/30 flex items-center justify-center">
                  VT
                </div>
                <div>
                  <p className="text-sm uppercase tracking-[0.3em] text-ash">Virtual Thread</p>
                  <p className="text-xs text-ash">Digital Try-On Studio</p>
                </div>
              </div>
              <div className="hidden md:flex items-center gap-4">
                {links.map((link) => (
                  <button
                    key={link.id}
                    className={`text-sm uppercase tracking-[0.2em] transition ${
                      page === link.id ? "text-snow" : "text-ash"
                    }`}
                    onClick={() => setPage(link.id)}
                  >
                    {link.label}
                  </button>
                ))}
              </div>
              <PrimaryButton className="px-4 py-2 text-xs" onClick={() => setPage("avatar")}>
                Start
              </PrimaryButton>
            </div>
          </nav>
        );
      };

      const App = () => {
        const [page, setPage] = useState("landing");
        const [category, setCategory] = useState("Streetwear");
        const [selectedId, setSelectedId] = useState(outfitData[0].id);
        const [rotation, setRotation] = useState(0);
        const [zoom, setZoom] = useState(1);
        const [mode, setMode] = useState("selfie");
        const [isGenerating, setIsGenerating] = useState(false);
        const [statusText, setStatusText] = useState("Scanning body proportions...");
        const [avatarReady, setAvatarReady] = useState(false);
        const [saved, setSaved] = useState(false);
        const [showAr, setShowAr] = useState(false);
        const [toast, setToast] = useState("");

        const outfitIndex = outfitData.findIndex((item) => item.id === selectedId);
        const outfit = outfitData[outfitIndex] || outfitData[0];

        const startGenerate = () => {
          if (isGenerating) return;
          setIsGenerating(true);
          setAvatarReady(false);
          const steps = [
            "Scanning body proportions...",
            "Generating 3D avatar...",
            "Calibrating fabric physics..."
          ];
          setStatusText(steps[0]);
          steps.forEach((step, index) => {
            setTimeout(() => {
              setStatusText(step);
              if (index === steps.length - 1) {
                setTimeout(() => {
                  setIsGenerating(false);
                  setAvatarReady(true);
                }, 800);
              }
            }, 1000 * (index + 1));
          });
        };

        const goToOutfits = () => setPage("outfits");

        const handleTryOutfit = (id) => {
          setSelectedId(id);
          setPage("tryon");
        };

        const handleNext = () => {
          const nextIndex = (outfitIndex + 1) % outfitData.length;
          setSelectedId(outfitData[nextIndex].id);
        };

        const handlePrev = () => {
          const prevIndex = (outfitIndex - 1 + outfitData.length) % outfitData.length;
          setSelectedId(outfitData[prevIndex].id);
        };

        const handleSave = () => {
          setSaved((prev) => !prev);
          setToast(saved ? "Look removed" : "Look saved");
        };

        const handleBuy = () => {
          setToast("Checkout initiated");
        };

        useEffect(() => {
          if (!toast) return;
          const timer = setTimeout(() => setToast(""), 2000);
          return () => clearTimeout(timer);
        }, [toast]);

        return (
          <div>
            <Navigation page={page} setPage={setPage} />
            {page === "landing" && <LandingPage onStart={() => setPage("avatar")} />}
            {page === "avatar" && (
              <AvatarCreationPage
                onGenerate={startGenerate}
                mode={mode}
                setMode={setMode}
                isGenerating={isGenerating}
                statusText={statusText}
                avatarReady={avatarReady}
                onContinue={goToOutfits}
              />
            )}
            {page === "outfits" && (
              <OutfitSelectionPage
                category={category}
                setCategory={setCategory}
                onTryOutfit={handleTryOutfit}
                selectedId={selectedId}
              />
            )}
            {page === "tryon" && (
              <TryOnPage
                outfit={outfit}
                rotation={rotation}
                setRotation={setRotation}
                zoom={zoom}
                setZoom={setZoom}
                onNext={handleNext}
                onPrev={handlePrev}
                onOpenAr={() => setShowAr(true)}
                saved={saved}
                onSave={handleSave}
                onBuy={handleBuy}
              />
            )}

            <footer className="border-t border-white/10 py-10">
              <div className="max-w-6xl mx-auto px-6 md:px-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4 text-ash text-sm">
                <span>Virtual Thread MVP - Digital fashion try-on platform.</span>
                <span>AI fit simulation and AR preview are mocked for demo purposes.</span>
              </div>
            </footer>

            {showAr && (
              <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                <div className="glass rounded-3xl p-6 max-w-md w-full relative overflow-hidden">
                  <div className="noise"></div>
                  <button
                    className="absolute top-4 right-4 text-ash"
                    onClick={() => setShowAr(false)}
                  >
                    Close
                  </button>
                  <h3 className="text-2xl font-display">AR Try-On</h3>
                  <p className="text-ash text-sm mt-2">
                    Mock AR environment - scanning room and anchoring avatar.
                  </p>
                  <div className="mt-6 h-56 rounded-2xl border border-white/10 bg-gradient-to-br from-white/10 to-white/0 relative overflow-hidden">
                    <div className="scan-line"></div>
                  </div>
                  <div className="mt-4 text-sm text-ash">Move your device to capture depth.</div>
                </div>
              </div>
            )}

            {toast && (
              <div className="fixed bottom-6 right-6 bg-snow text-onyx px-4 py-3 rounded-full text-sm shadow-glow">
                {toast}
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot
        ? ReactDOM.createRoot(document.getElementById("root"))
        : null;

      if (root) {
        root.render(<App />);
      } else {
        ReactDOM.render(<App />, document.getElementById("root"));
      }
    </script>
  </body>
</html>
